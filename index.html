<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Warriors of Daylight</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23151922'/%3E%3Cpath d='M7 25h18V11l-9-6-9 6z' fill='%23f0c15b'/%3E%3Cpath d='M13 25v-8h6v8z' fill='%2326344f'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="Warriors of Daylight game">
        <div class="topbar">
          <div>
            <h1>Warriors of Daylight</h1>
            <p id="statusLine">Loading the realm...</p>
          </div>
          <div class="controls">
            <button id="saveBtn" type="button" title="Save game">Save</button>
            <button id="resetBtn" type="button" title="Reset game">Reset</button>
          </div>
        </div>
        <canvas id="game" width="768" height="512" aria-label="Playable retro RPG map"></canvas>
        <div class="mobile-pad" aria-label="Movement controls">
          <button data-move="up" aria-label="Move up">&uarr;</button>
          <button data-move="left" aria-label="Move left">&larr;</button>
          <button data-move="right" aria-label="Move right">&rarr;</button>
          <button data-move="down" aria-label="Move down">&darr;</button>
        </div>
      </section>

      <aside class="side-panel" aria-label="Party and quest log">
        <div class="asset-frame">
          <img src="assets/generated-spritesheet.png" alt="Generated retro fantasy sprite sheet" />
        </div>
        <section>
          <h2>Champion</h2>
          <div id="heroStats" class="stat-grid"></div>
        </section>
        <section>
          <h2>Party</h2>
          <div id="partyList" class="party-list"></div>
        </section>
        <section>
          <h2>Inventory</h2>
          <div id="inventoryList" class="inventory-list"></div>
        </section>
        <section>
          <h2>Quest Log</h2>
          <ol id="questLog" class="quest-log"></ol>
        </section>
        <section>
          <h2>How To Play</h2>
          <p class="small">Move with WASD, arrow keys, or the pad. Visit towns to recruit, mines for gold, chests for relics, and challenge wild guardians. Defeat the rival mage at the black tower.</p>
        </section>
      </aside>
    </main>

    <dialog id="modal">
      <form method="dialog" class="modal-card">
        <h2 id="modalTitle">Event</h2>
        <div id="modalText" class="modal-text"></div>
        <div id="modalActions" class="modal-actions"></div>
      </form>
    </dialog>

    <script src="game.js"></script>
  </body>
</html>
